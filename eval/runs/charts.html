const fmtInt = new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 });
const fmtPct = (value) => (value * 100).toFixed(1) + "%";
const tokenLabel = (value) => fmtInt.format(value);
const byId = (id) => document.getElementById(id);
const el = (tag, className, text) => {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
};

const totalCases = SUMMARY.crossRepo.repoCount * SUMMARY.crossRepo.casesPerRepo;
const totalCorrect = Object.values(SUMMARY.crossRepo.overallCorrectness).reduce(
  (sum, rate) => sum + rate * totalCases,
  0
);
const hitCount = Math.round(SUMMARY.crossRepo.overallHitRateAnyRank * totalCases);
const topRankHitCount = Math.round(SUMMARY.crossRepo.overallHitRateTopRank * totalCases);
const stats = [
  [SUMMARY.crossRepo.totalRuns + " runs", "completed evaluations"],
  [(totalCorrect / SUMMARY.crossRepo.totalRuns * 100).toFixed(0) + "% correct", totalCorrect + "/" + SUMMARY.crossRepo.totalRuns],
  [fmtPct(SUMMARY.crossRepo.overallHitRateAnyRank) + " chart surfaced", hitCount + "/" + totalCases],
  [SUMMARY.crossRepo.unweightedMeanSavingsPct.toFixed(1) + "% avg savings", "unweighted"],
  [SUMMARY.crossRepo.weightedMeanSavingsPct.toFixed(1) + "% pooled", "weighted by tokens"],
  ["≈ " + SUMMARY.crossRepo.meanBreakEvenRecalls.toFixed(2) + " recalls", "break-even"],
];

const statsNode = byId("stats");
for (const [value, label] of stats) {
  const item = el("div", "stat");
  item.append(el("strong", "", value), el("span", "", label));
  statsNode.append(item);
}
byId("hit-diagnostic").textContent =
  "precision@1: " +
  fmtPct(SUMMARY.crossRepo.overallHitRateTopRank) +
  " (" +
  topRankHitCount +
  "/" +
  totalCases +
  ") — correct chart ranked #1";

const heroMax = Math.max(...SUMMARY.repos.map((repo) => repo.armMeans.baseline));
const heroBars = el("div", "hero-bars");
for (const repo of SUMMARY.repos) {
  const group = el("div", "repo-group");
  group.append(el("div", "savings", repo.savingsPct.toFixed(1) + "% saved"));
  const bars = el("div", "bars");
  for (const condition of ["baseline", "recall"]) {
    const value = repo.armMeans[condition];
    const wrap = el("div", "bar-wrap");
    wrap.append(el("div", "value", tokenLabel(value)));
    const bar = el("div", "bar " + condition);
    bar.style.height = (value / heroMax * 100).toFixed(2) + "%";
    wrap.append(bar);
    bars.append(wrap);
  }
  group.append(bars, el("div", "repo-name", repo.slug));
  heroBars.append(group);
}
byId("hero").append(heroBars);
byId("axis-note").textContent = "Zero-based token axis, 0 to " + tokenLabel(heroMax) + " tokens.";

const panels = byId("panels");
for (const repo of SUMMARY.repos) {
  const panel = el("article", "panel");
  const head = el("div", "panel-head");
  head.append(
    el("h3", "", repo.slug),
    el("div", "panel-meta", repo.savingsPct.toFixed(1) + "% saved · " + fmtPct(repo.hitRate) + " hits")
  );
  panel.append(head);
  const scroll = el("div", "scroll");
  const chart = el("div", "case-chart");
  const max = Math.max(...repo.cases.map((testCase) => testCase.baselineTokens));
  const cases = [...repo.cases].sort((a, b) => b.baselineTokens - a.baselineTokens);
  for (const testCase of cases) {
    const row = el("div", "case-row");
    row.append(el("div", "case-label", testCase.label ?? testCase.caseId));
    const bars = el("div", "case-bars");
    const baseline = el("div", "hbar baseline");
    baseline.style.width = (testCase.baselineTokens / max * 100).toFixed(2) + "%";
    const recall = el("div", "hbar recall");
    recall.style.width = (testCase.recallTokens / max * 100).toFixed(2) + "%";
    bars.append(baseline, recall);
    row.append(bars, el("div", "case-values", tokenLabel(testCase.baselineTokens) + " / " + tokenLabel(testCase.recallTokens)));
    chart.append(row);
  }
  scroll.append(chart);
  panel.append(scroll);
  panels.append(panel);
}

byId("generated").textContent = "Generated " + new Date(SUMMARY.generatedAt).toLocaleString() + " from embedded summary data.";
